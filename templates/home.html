<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSOTROS RD - Sentinel</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            border: 2px solid #00ff41;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 15px #00ff41;
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 2em;
            letter-spacing: 5px;
        }
        .status {
            font-size: 1.2em;
            margin-top: 20px;
            border-top: 1px solid #00ff41;
            padding-top: 20px;
        }
        .blink {
            animation: b 1.5s infinite;
        }
        @keyframes b {
            50% { opacity: 0; }
        }
        .admin-link {
            margin-top: 20px;
            display: block;
            color: #00ff41;
            text-decoration: none;
            border: 1px solid #00ff41;
            padding: 10px;
            border-radius: 5px;
        }
        .admin-link:hover {
            background-color: #00ff41;
            color: #050505;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>NOSOTROS RD</h1>
        <p>SISTEMA SENTINEL</p>
        <div class="status">ESTADO: <span class="blink">ONLINE</span></div>
        <a href="/admin/login" class="admin-link">PANEL DE ADMINISTRACIÓN</a>
    </div>
</body>
</html>
